name: Hidden Build and Deploy

on:
  repository_dispatch:
    types: [build_site]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Code
        uses: actions/checkout@v4
        with:
          repository: HimanshuTyagiJi/TyagiHubPrivate
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Ruby dependencies & Build Jekyll
        run: |
          bundle install
          bundle exec jekyll build

      - name: Merge and Minify CSS
        run: |
          npm install -g clean-css-cli
          cleancss -o _site/assets/css/search-main.css _site/assets/css/main.css _site/assets/css/search.css

      - name: Format HTML
        run: |
          npm install -g js-beautify
          find _site -type f -name "*.html" -exec html-beautify \
            --indent-size 2 \
            --preserve-newlines false \
            --max-preserve-newlines 0 \
            -r {} \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
